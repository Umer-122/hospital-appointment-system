<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Hospital System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>🏥 Hospital System</h1>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="appointments.html">Appointments</a></li>
            <li><a href="#" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <h2 style="text-align:center; padding: 30px; color: #2c3e50;">Dashboard Statistics</h2>

    <div class="stats">
        <div class="stat-card">
            <h3 id="doctors">...</h3>
            <p>Total Doctors</p>
        </div>
        <div class="stat-card">
            <h3 id="patients">...</h3>
            <p>Total Patients</p>
        </div>
        <div class="stat-card">
            <h3 id="appointments">...</h3>
            <p>Total Appointments</p>
        </div>
    </div>

    <script>
        // Security Gate: Check user role immediately before loading data
        const role = localStorage.getItem("role");
        if (role !== "admin") {
            window.location.href = "login.html";
        }

        const API = "http://127.0.0.1:8000";

        // Fetch aggregation metrics from the FastAPI backend
        async function loadStats() {
            try {
                const res = await fetch(`${API}/dashboard-stats`);
                const data = await res.json();
                document.getElementById("doctors").textContent = data.doctors;
                document.getElementById("patients").textContent = data.patients;
                document.getElementById("appointments").textContent = data.appointments;
            } catch (error) {
                console.error("Failed to load dashboard statistics:", error);
            }
        }

        // Global function to clear session storage and log out safely
        function logout() {
            localStorage.removeItem("role");
            window.location.href = "login.html";
        }

        // Run dashboard initial loading sequence
        loadStats();
    </script>

</body>
</html>
